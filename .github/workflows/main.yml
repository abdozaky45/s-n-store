name: Deploy to AWS Elastic Beanstalk

on:
  push:
    branches:
      - main    

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Create deployment package
      run: |
        zip -r deployment-package.zip \
          package.json \
          package-lock.json \
          .platform \
          dist \
          -x "*.git*" "node_modules/*"

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Deploy to Elastic Beanstalk
      env:
        EB_APP_NAME: ${{ secrets.EB_APP_NAME }}
        EB_ENV_NAME: ${{ secrets.EB_ENV_NAME }}
        AWS_REGION: ${{ secrets.AWS_REGION }}
      run: |
        VERSION_LABEL="sn-langire-v${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
        S3_BUCKET="${EB_APP_NAME}-deployments"
        S3_KEY="${VERSION_LABEL}.zip"
        
        aws s3 mb s3://${S3_BUCKET} --region ${AWS_REGION} 2>/dev/null || true
        aws s3 cp deployment-package.zip s3://${S3_BUCKET}/${S3_KEY}
        
        aws elasticbeanstalk create-application-version \
          --application-name ${EB_APP_NAME} \
          --version-label ${VERSION_LABEL} \
          --source-bundle S3Bucket="${S3_BUCKET}",S3Key="${S3_KEY}" \
          --region ${AWS_REGION}
        
        aws elasticbeanstalk update-environment \
          --application-name ${EB_APP_NAME} \
          --environment-name ${EB_ENV_NAME} \
          --version-label ${VERSION_LABEL} \
          --region ${AWS_REGION}
        
        echo "Deployment completed: ${VERSION_LABEL}"